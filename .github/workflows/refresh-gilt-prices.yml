name: Refresh gilt prices

on:
  schedule:
    # 18:00 UTC, Mon-Fri. The DMO publishes after the LSE close
    # (16:30 UK local). 18:00 UTC = 18:00 GMT / 19:00 BST, comfortably
    # after the file is updated.
    - cron: "0 18 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-gilt-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install xlsx
        run: npm install xlsx@^0.18.5 --no-save --no-audit --no-fund

      - name: Fetch DMO file and rebuild gilt-prices.json
        run: node scripts/refresh-gilt-prices.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/gilt-prices.json
          if git diff --staged --quiet; then
            echo "No price changes today."
          else
            git commit -m "chore: refresh gilt prices ($(date -u +%Y-%m-%d))"
            git push
          fi
