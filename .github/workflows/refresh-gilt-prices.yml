name: Refresh gilt prices

on:
  schedule:
    # 18:00 UTC, Mon-Fri. The DMO publishes after the LSE close.
    - cron: "0 18 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-gilt-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild gilt-prices.json
        run: node scripts/refresh-gilt-prices.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/gilt-prices.json
          if git diff --staged --quiet; then
            echo "No price changes today."
          else
            git commit -m "chore: refresh gilt prices ($(date -u +%Y-%m-%d))"
            git push
          fi
